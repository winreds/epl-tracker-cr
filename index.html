const getUsers=()=>{
  try{
    const saved=localStorage.getItem('eplcr_users');
    const saved_arr=saved?JSON.parse(saved):[];
    /* Always merge: keep saved passwords but add any missing default users */
    const merged=DEFAULT_USERS.map(def=>{
      const existing=saved_arr.find(u=>u.id===def.id);
      /* If user already exists in localStorage keep their saved password, else use default */
      return existing?{...def,pwd:existing.pwd}:def;
    });
    localStorage.setItem('eplcr_users',JSON.stringify(merged));
    return merged;
  }catch(e){
    localStorage.setItem('eplcr_users',JSON.stringify(DEFAULT_USERS));
    return DEFAULT_USERS;
  }
};
const saveUsers=u=>localStorage.setItem('eplcr_users',JSON.stringify(u));

                      style={{width:46,padding:'6px',textAlign:'center',
                        background:cellEdit?'#1a2540':'#111825',
                        border:`1px solid ${predR&&sc.as!==''?um.c+'55':'#ffffff18'}`,
                        borderRadius:8,color:'#fff',fontSize:20,fontWeight:800,outline:'none',
                        fontFamily:"'Barlow Condensed',sans-serif",cursor:cellEdit?'text':'default'}}/>
                  </div>
                  <span style={{fontSize:12,color:'#8090b0',flex:1,textAlign:'left'}}>{T[g.a].n}</span>
                </div>
                {/* Auto derived result */}
                {predR&&(
                  <div style={{marginTop:7,display:'flex',justifyContent:'center',alignItems:'center',gap:8}}>
                    <div style={{padding:'3px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:.5,
                      background:predR==='h'?T[g.h].c+'33':predR==='a'?T[g.a].c+'33':'#f0c04033',
                      color:predR==='h'?T[g.h].c:predR==='a'?T[g.a].c:'#f0c040',
                      border:`1px solid ${predR==='h'?T[g.h].c+'55':predR==='a'?T[g.a].c+'55':'#f0c04055'}`}}>
                      {predR==='h'?`Gana ${T[g.h].n}`:predR==='a'?`Gana ${T[g.a].n}`:'Empate'}
                    </div>
                    {realR&&<span style={{fontSize:11,color:ok?'#00d4aa':'#ff4455',fontWeight:700}}>{ok?'✓ Acertó':'✗ Falló'}</span>}
                  </div>
                )}
                {cellEdit&&predR&&<button className="pb" onClick={()=>{const setter=who==='win'?setPredWin:setPredSanti;setter(p=>{const n={...p};delete n[g.id];return n;});}} style={{display:'block',margin:'6px auto 0',background:'#ff445518',color:'#ff4455',border:'1px solid #ff445540',padding:'3px 10px',fontSize:10}}>✕ Borrar</button>}
              </div>
              );
            })}
          </div>);
        })()}

        {/* MARCADOR — real results (admin only) */}
        {pTab==='board'&&(()=>{
          const sc2={win:calcScore('win'),santi:calcScore('santi'),claude:calcScore('claude')};
          const ranked=Object.entries(sc2).sort((a,b)=>b[1].pct-a[1].pct);
          return(<div>
            <div style={{fontSize:9,color:'#00d4aa',letterSpacing:2,marginBottom:6}}>MARCADORES REALES</div>
            <div style={{fontSize:11,color:'#6070a0',background:'#0d1220',border:'1px solid #ffffff0a',borderRadius:8,padding:'8px 11px',marginBottom:8}}>
              {user.role==='admin'?'✅ Admin — ingresa el marcador real. El resultado (G/E/P) se calcula solo y se refleja en todos los tabs.':'👁️ Solo admins pueden ingresar marcadores reales.'}
            </div>
            {UPCOMING.map(g=>{
              const s=scores[g.id]||{hs:'',as:''};const r=scoreToResult(s.hs,s.as);const canEdit=user.role==='admin';
              const allPreds={win:predResults.win[g.id],santi:predResults.santi[g.id],claude:predResults.claude[g.id]};
              return(
              <div key={g.id} style={{background:'#0d1220',border:`1px solid ${r?'#00d4aa33':'#ffffff0a'}`,borderRadius:9,marginBottom:5,padding:'9px 11px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
                  <div style={{flex:1,textAlign:'right',fontSize:13,fontWeight:700,color:'#fff',lineHeight:1.2}}>{T[g.h].n}</div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                    <input type="number" min="0" max="20" value={s.hs} onChange={e=>canEdit&&setScore(g.id,'hs',e.target.value)} readOnly={!canEdit}
                      style={{width:44,padding:'5px',textAlign:'center',background:canEdit?'#151d2e':'#0d1220',border:`1px solid ${r&&s.hs!==''?'#00d4aa55':'#ffffff18'}`,borderRadius:7,color:'#fff',fontSize:18,fontWeight:800,outline:'none',fontFamily:"'Barlow Condensed',sans-serif",cursor:canEdit?'text':'default'}}/>
                    <span style={{color:'#6070a0',fontWeight:700,fontSize:18,fontFamily:"'Barlow Condensed',sans-serif"}}>-</span>
                    <input type="number" min="0" max="20" value={s.as} onChange={e=>canEdit&&setScore(g.id,'as',e.target.value)} readOnly={!canEdit}
                      style={{width:44,padding:'5px',textAlign:'center',background:canEdit?'#151d2e':'#0d1220',border:`1px solid ${r&&s.as!==''?'#00d4aa55':'#ffffff18'}`,borderRadius:7,color:'#fff',fontSize:18,fontWeight:800,outline:'none',fontFamily:"'Barlow Condensed',sans-serif",cursor:canEdit?'text':'default'}}/>
                  </div>
                  <div style={{flex:1,textAlign:'left',fontSize:13,fontWeight:700,color:'#fff',lineHeight:1.2}}>{T[g.a].n}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,marginBottom:r?7:0}}>
                  <span style={{fontSize:10,color:'#6070a0'}}>{g.date} · {g.time} CR</span>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    {r&&<div style={{padding:'3px 12px',borderRadius:6,fontSize:11,fontWeight:700,background:r==='h'?T[g.h].c+'33':r==='a'?T[g.a].c+'33':'#f0c04033',color:r==='h'?T[g.h].c:r==='a'?T[g.a].c:'#f0c040',border:`1px solid ${r==='h'?T[g.h].c+'55':r==='a'?T[g.a].c+'55':'#f0c04055'}`}}>
                      {r==='h'?`Gana ${T[g.h].n}`:r==='a'?`Gana ${T[g.a].n}`:'Empate'}
                    </div>}
                    {canEdit&&r&&<button className="pb" onClick={()=>setScores(p=>{const n={...p};delete n[g.id];return n;})} style={{background:'#ff445518',color:'#ff4455',border:'1px solid #ff445540',padding:'4px 8px',fontSize:11}}>✕</button>}
                  </div>
                </div>
                {r&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>
                  {Object.entries(UM).map(([uid,um])=>{
                    const pr=allPreds[uid];const ok=pr&&pr===r;const fail=pr&&pr!==r;
                    const ps=uid==='win'?predWin[g.id]:uid==='santi'?predSanti[g.id]:predClaude[g.id];
                    const psStr=ps&&ps.hs!==''&&ps.as!==''?`${ps.hs}–${ps.as}`:'—';
                    return(<div key={uid} style={{padding:'5px 6px',borderRadius:7,textAlign:'center',background:ok?'#00d4aa12':fail?'#ff445512':'#151d2e',border:`1px solid ${ok?'#00d4aa33':fail?'#ff445533':'#ffffff0a'}`}}>
                      <div style={{fontSize:10,color:um.c,fontWeight:700}}>{um.i} {um.l}</div>
                      <div style={{fontSize:13,fontWeight:800,color:'#dde8ff',fontFamily:"'Barlow Condensed',sans-serif"}}>{psStr}</div>
                      <div style={{fontSize:10,color:ok?'#00d4aa':fail?'#ff4455':'#6070a0',fontWeight:700}}>{pr?pL(pr):'Sin pred.'} {ok?'✓':fail?'✗':''}</div>
                    </div>);
                  })}
                </div>}
              </div>);})}
            <div style={{fontSize:9,color:'#f0c040',letterSpacing:2,margin:'14px 0 8px'}}>🏅 TABLA DE ACIERTOS</div>
            {ranked.map(([name,s],i)=>{const m=UM[name];return(
              <div key={name} style={{background:i===0?'linear-gradient(135deg,#1a1400,#2a1e00)':'#0d1220',border:`1px solid ${i===0?'#f0c04055':'#ffffff0a'}`,borderRadius:11,marginBottom:6,padding:'12px 15px',display:'flex',alignItems:'center',gap:11}}>
                <div style={{fontSize:24,lineHeight:1}}>{med(i)}</div>
                <div style={{width:4,height:40,borderRadius:2,background:m.c,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:i===0?'#f0c040':'#dde8ff',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>{m.i} {m.l}{name===user.id&&<span style={{marginLeft:7,fontSize:9,color:m.c,background:m.c+'22',padding:'1px 6px',borderRadius:4}}>TÚ</span>}</div>
                  <div style={{fontSize:11,color:'#6070a0',marginTop:2}}>{s.w} acertadas de {s.tot} con resultado real</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:28,fontWeight:800,lineHeight:1,color:i===0?'#f0c040':m.c,fontFamily:"'Barlow Condensed',sans-serif"}}>{s.pct}%</div>
                  <div style={{fontSize:10,color:'#6070a0'}}>precisión</div>
                </div>
              </div>);})}
            {Object.keys(actual).length===0&&<div style={{textAlign:'center',color:'#6070a0',fontSize:13,padding:'18px',background:'#0d1220',borderRadius:10,border:'1px solid #ffffff0a',lineHeight:1.6}}>☝️ Ingresa un marcador real para calcular aciertos.</div>}
          </div>);
        })()}
      </div>}

      {/* ══ COMPARAR ══ */}
      {tab==='comparar'&&<div className="fade">
        <div style={{fontSize:9,color:'#00d4aa',letterSpacing:2,marginBottom:4}}>COMPARACIÓN DE PREDICCIONES · JOR. 29-30</div>
        <div style={{fontSize:11,color:'#6070a0',marginBottom:12,lineHeight:1.5}}>
          Ve las predicciones de todos lado a lado. El resultado real aparece cuando un Admin ingrese el marcador en Predicciones → Marcador.
        </div>
        {/* Legend */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:12}}>
          {Object.entries(UM).map(([uid,um])=>(
            <div key={uid} style={{background:'#0d1220',border:`1px solid ${um.c}44`,borderRadius:9,padding:'8px',textAlign:'center'}}>
              <div style={{fontSize:18}}>{um.i}</div>
              <div style={{fontSize:13,fontWeight:700,color:um.c,fontFamily:"'Barlow Condensed',sans-serif"}}>{um.l}</div>
              <div style={{fontSize:10,color:'#6070a0',marginTop:2}}>
                {(()=>{const s=calcScore(uid);return s.tot?`${s.w}/${s.tot} · ${s.pct}%`:'Sin resultados aún';})()}
              </div>
            </div>
          ))}
        </div>
        {UPCOMING.map(g=>{
          const realR=actual[g.id];
          const realSc=scores[g.id]||{hs:'',as:''};
          const hasRealSc=realSc.hs!==''&&realSc.as!=='';
          const pScores={win:predWin[g.id]||{hs:'',as:''},santi:predSanti[g.id]||{hs:'',as:''},claude:predClaude[g.id]||{hs:'',as:''}};
          const pResults={win:predResults.win[g.id],santi:predResults.santi[g.id],claude:predResults.claude[g.id]};
          return(
          <div key={g.id} style={{background:'#0d1220',border:`1px solid ${realR?'#ffffff15':'#ffffff08'}`,borderRadius:11,marginBottom:8,overflow:'hidden'}}>
            {/* Match header */}
            <div style={{padding:'9px 12px',background:'#111826',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{T[g.h].n}</span>
                <span style={{fontSize:11,color:'#6070a0',margin:'0 6px'}}>vs</span>
                <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{T[g.a].n}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                {hasRealSc&&(
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:10,color:'#6070a0'}}>Real:</span>
                    <span style={{fontSize:16,fontWeight:800,color:'#00d4aa',fontFamily:"'Barlow Condensed',sans-serif",background:'#00d4aa18',padding:'2px 10px',borderRadius:6,border:'1px solid #00d4aa33'}}>{realSc.hs}–{realSc.as}</span>
                    <span style={{fontSize:10,color:realR==='h'?T[g.h].c:realR==='a'?T[g.a].c:'#f0c040',fontWeight:700}}>{realR==='h'?T[g.h].n:realR==='a'?T[g.a].n:'Empate'}</span>
                  </div>
                )}
                {!hasRealSc&&<span style={{fontSize:9,color:'#6070a0',background:'#151d2e',padding:'2px 7px',borderRadius:4}}>{g.date} · {g.time}</span>}
              </div>
            </div>
            {/* 3-col predictions */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:1}}>
              {Object.entries(UM).map(([uid,um])=>{
                const ps=pScores[uid];const pr=pResults[uid];
                const hasPs=ps.hs!==''&&ps.as!=='';
                const ok=realR&&pr&&realR===pr;const fail=realR&&pr&&realR!==pr;
                return(
                <div key={uid} style={{padding:'10px 8px',textAlign:'center',
                  background:ok?'#00d4aa0a':fail?'#ff44550a':'transparent',
                  borderTop:`1px solid ${ok?'#00d4aa22':fail?'#ff445522':'#ffffff08'}`}}>
                  <div style={{fontSize:10,color:um.c,fontWeight:700,marginBottom:5}}>{um.i} {um.l}</div>
                  {hasPs?(
                    <>
                      <div style={{fontSize:22,fontWeight:800,color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>{ps.hs} – {ps.as}</div>
                      {pr&&<div style={{fontSize:10,marginTop:4,padding:'2px 8px',borderRadius:5,display:'inline-block',
                        background:pr==='h'?T[g.h].c+'22':pr==='a'?T[g.a].c+'22':'#f0c04022',
                        color:pr==='h'?T[g.h].c:pr==='a'?T[g.a].c:'#f0c040',fontWeight:700}}>
                        {pr==='h'?T[g.h].n.split(' ')[0]:pr==='a'?T[g.a].n.split(' ')[0]:'Empate'}
                      </div>}
                      {realR&&<div style={{fontSize:16,marginTop:4}}>{ok?'✅':'❌'}</div>}
                    </>
                  ):(
                    <div style={{fontSize:11,color:'#404a60',marginTop:4}}>Sin pred.</div>
                  )}
                </div>);
              })}
            </div>
          </div>
          );
        })}
      </div>}
    </main>
    <footer style={{textAlign:'center',padding:'9px',borderTop:'1px solid #ffffff08',fontSize:10,color:'#405070',letterSpacing:1}}>EPL TRACKER CR · github.com/winreds · 2026</footer>
  </div>
  );
}

/* ═══════════════════ ROOT ═══════════════════ */
function Root(){
  const[user,setUser]=useState(()=>getSession());
  return user?<MainApp user={user} onLogout={()=>setUser(null)}/>:<Login onLogin={u=>setUser(u)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
