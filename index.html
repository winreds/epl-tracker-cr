                    <div style={{fontSize:10,color:'#f0c04099',letterSpacing:2,marginBottom:4}}>🏆 CAMPEÓN</div>
                    <div style={{fontSize:22,fontWeight:800,color:'#f0c040',fontFamily:"'Barlow Condensed',sans-serif"}}>
                      {T[h.champ].n}</div>
                    <div style={{fontSize:12,color:'#f0c04099'}}>{h.pts} pts · {h.scorer}</div>
                  </div>
                  <div style={{fontSize:42}}>🏆</div>
                </div>
              )}
            </div>

            <div style={{fontSize:10,color:'#00d4aa',letterSpacing:2,marginBottom:8}}>PARTIDOS DESTACADOS</div>
            {h.matches.map((m,i)=>{
              const[hs,as]=m.s.split('-').map(Number);
              const hw=hs>as,aw=as>hs;
              return(
              <div key={i} style={{
                background:'#0d1220',border:'1px solid #ffffff08',
                borderRadius:9,marginBottom:5,padding:'10px 14px',
              }}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <span style={{flex:1,textAlign:'right',fontWeight:hw?700:500,
                    fontSize:14,color:hw?'#fff':'#6070a0'}}>{T[m.h]?.n||m.h}</span>
                  <div style={{
                    padding:'3px 12px',background:'#151d2e',borderRadius:7,
                    fontWeight:700,fontSize:15,color:'#fff',border:'1px solid #ffffff18',minWidth:56,textAlign:'center',
                  }}>{m.s}</div>
                  <span style={{flex:1,textAlign:'left',fontWeight:aw?700:500,
                    fontSize:14,color:aw?'#fff':'#6070a0'}}>{T[m.a]?.n||m.a}</span>
                </div>
                <div style={{textAlign:'center',fontSize:11,color:'#6070a0',fontStyle:'italic'}}>{m.n}</div>
              </div>
              );
            })}
          </div>
        );})()}
      </div>}

      {/* ════════ PRÓXIMOS ════════ */}
      {tab==='fixtures'&&<div className="fade">
        <div style={{fontSize:10,color:'#00d4aa',letterSpacing:2,marginBottom:10}}>
          JORNADA 29-30 · 14-16 MAR 2026 · HORA COSTA RICA
        </div>
        {UPCOMING.map(m=>{
          const isOpen=openH2H===m.id;
          const maxP=Math.max(m.prob.h,m.prob.a,m.prob.d);
          const winner=m.prob.h===maxP?T[m.h].n:m.prob.a===maxP?T[m.a].n:'Empate';
          return(
          <div key={m.id} style={{
            background:'#0d1220',border:'1px solid #ffffff0a',
            borderRadius:11,marginBottom:8,overflow:'hidden',
          }}>
            <div style={{padding:'10px 12px'}}>
              {/* Fecha y H2H toggle */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:11,color:'#6070a0',fontWeight:600}}>
                  {m.date} · {m.time} CR
                </span>
                <button onClick={()=>setOpenH2H(isOpen?null:m.id)} style={{
                  background:'transparent',border:'1px solid #ffffff15',
                  color:'#6070a0',borderRadius:5,padding:'2px 9px',
                  cursor:'pointer',fontSize:11,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,
                }}>H2H {isOpen?'▲':'▼'}</button>
              </div>

              {/* Equipos */}
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <div style={{flex:1,textAlign:'right'}}>
                  <div style={{
                    fontWeight:700,fontSize:15,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5,
                    color:m.prob.h===maxP?'#fff':'#6070a0',
                  }}>{T[m.h].n}</div>
                  <div style={{fontSize:10,color:'#6070a0'}}>🏠 Local</div>
                </div>
                <div style={{
                  padding:'5px 10px',background:'#151d2e',borderRadius:8,
                  fontWeight:800,fontSize:13,color:'#8090b0',
                  border:'1px solid #ffffff15',flexShrink:0,
                  fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,
                }}>VS</div>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{
                    fontWeight:700,fontSize:15,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5,
                    color:m.prob.a===maxP?'#fff':'#6070a0',
                  }}>{T[m.a].n}</div>
                  <div style={{fontSize:10,color:'#6070a0'}}>✈️ Visita</div>
                </div>
              </div>

              {/* Barras de probabilidad */}
              <div style={{fontSize:10,color:'#6070a0',letterSpacing:1.5,marginBottom:6}}>PROBABILIDAD</div>
              {[
                {label:T[m.h].n,val:m.prob.h,col:T[m.h].c},
                {label:'Empate',val:m.prob.d,col:'#f0c040'},
                {label:T[m.a].n,val:m.prob.a,col:T[m.a].c},
              ].map((p,j)=>(
                <div key={j} style={{marginBottom:5}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}>
                    <span style={{color:p.val===maxP?'#dde8ff':'#6070a0'}}>{p.label}</span>
                    <span style={{fontWeight:700,color:p.val===maxP?'#fff':'#6070a0'}}>{p.val}%</span>
                  </div>
                  <div style={{height:6,background:'#1a2236',borderRadius:3,overflow:'hidden'}}>
                    <div style={{
                      height:'100%',width:`${p.val}%`,
                      background:p.val===maxP?p.col:p.col+'66',
                      borderRadius:3,transition:'width .7s ease',
                    }}/>
                  </div>
                </div>
              ))}

              <div style={{
                marginTop:8,fontSize:11,color:'#6070a0',textAlign:'center',
                background:'#151d2e',padding:'5px',borderRadius:6,
              }}>
                📈 Favorito: <strong style={{color:'#00d4aa'}}>{winner}</strong> ({maxP}%)
              </div>
            </div>

            {/* H2H drawer */}
            {isOpen&&(
            <div style={{background:'#080d18',borderTop:'1px solid #ffffff0a',padding:'10px 14px'}}>
              <div style={{fontSize:10,color:'#00d4aa',letterSpacing:2,marginBottom:8}}>
                HISTORIAL DE ENFRENTAMIENTOS</div>
              {m.h2h.map((hh,j)=>(
                <div key={j} style={{
                  display:'flex',gap:10,marginBottom:5,fontSize:12,
                  padding:'5px 8px',background:'#0d1220',borderRadius:6,
                }}>
                  <span style={{
                    color:'#8090b0',width:42,flexShrink:0,fontWeight:600,
                    background:'#151d2e',borderRadius:4,padding:'1px 5px',textAlign:'center',
                  }}>{hh.s}</span>
                  <span style={{color:'#dde8ff'}}>{hh.r}</span>
                </div>
              ))}
            </div>
            )}
          </div>
          );
        })}
      </div>}

      {/* ════════ TABLA ════════ */}
      {tab==='table'&&<div className="fade">
        <div style={{
          background:'#0d1220',borderRadius:11,overflow:'hidden',
          border:'1px solid #ffffff0a',
        }}>
          {/* Header */}
          <div style={{
            display:'grid',gridTemplateColumns:'30px 6px 1fr 36px 28px 28px 28px 36px',
            gap:3,padding:'8px 10px',background:'#111826',
            fontSize:10,color:'#6070a0',letterSpacing:.5,fontWeight:700,
          }}>
            <span>#</span><span/>
            <span>EQUIPO</span>
            <span style={{textAlign:'center'}}>PJ</span>
            <span style={{textAlign:'center'}}>G</span>
            <span style={{textAlign:'center'}}>E</span>
            <span style={{textAlign:'center'}}>P</span>
            <span style={{textAlign:'right',color:'#00d4aa'}}>PTS</span>
          </div>

          {STANDINGS.map((s,i)=>{
            const b=badge(s.r);
            return(
            <div key={i} className="rh" style={{
              display:'grid',gridTemplateColumns:'30px 6px 1fr 36px 28px 28px 28px 36px',
              gap:3,padding:'7px 10px',alignItems:'center',fontSize:13,
              background:i%2===0?'#0d1220':'#0a101c',
              borderLeft:`3px solid ${b.col!=='transparent'?b.col:'transparent'}`,
            }}>
              <span style={{fontWeight:700,
                color:s.r<=4?'#00d4aa':s.r>=18?'#ff4455':'#6070a0',
                fontSize:12}}>{s.r}</span>
              <div style={{width:6,height:22,borderRadius:2,background:TEAMS[s.a].c}}/>
              <span style={{fontWeight:600,fontSize:13}}>{TEAMS[s.a].n}</span>
              <span style={{textAlign:'center',color:'#6070a0',fontSize:12}}>{s.gp}</span>
              <span style={{textAlign:'center',color:'#6070a0',fontSize:12}}>{s.w}</span>
              <span style={{textAlign:'center',color:'#6070a0',fontSize:12}}>{s.d}</span>
              <span style={{textAlign:'center',color:'#6070a0',fontSize:12}}>{s.l}</span>
              <span style={{textAlign:'right',fontWeight:800,fontSize:15,
                color:s.r===1?'#f0c040':s.r<=4?'#00d4aa':'#dde8ff'}}>{s.pts}</span>
            </div>
            );
          })}
        </div>

        {/* Leyenda */}
        <div style={{display:'flex',gap:14,marginTop:10,fontSize:11,color:'#6070a0',
          padding:'0 4px',flexWrap:'wrap'}}>
          {[['#00d4aa','Champions League'],['#f0c040','Europa League'],['#ff4455','Descenso']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:8,height:8,borderRadius:2,background:c}}/>
              <span>{l}</span>
            </div>
          ))}
        </div>
      </div>}

      {/* ════════ PREDICTOR ════════ */}
      {tab==='pred'&&<div className="fade">

        {/* Sub-nav */}
        <div style={{
          display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',
          gap:3,background:'#0d1220',padding:5,borderRadius:10,
          border:'1px solid #ffffff0a',marginBottom:12,
        }}>
          {[
            {id:'win',   icon:'⚽', label:'Win'},
            {id:'santi', icon:'🎯', label:'Santi'},
            {id:'claude',icon:'🤖', label:'Claude'},
            {id:'board', icon:'🏅', label:'Marcador'},
          ].map(pt=>(
            <button key={pt.id} onClick={()=>setPTab(pt.id)} style={{
              padding:'8px 4px',border:'none',cursor:'pointer',borderRadius:7,
              background:pTab===pt.id?'#00d4aa':'transparent',
              color:pTab===pt.id?'#070b16':'#6070a0',
              fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:12,
              transition:'all .2s',display:'flex',flexDirection:'column',
              alignItems:'center',gap:2,
            }}>
              <span style={{fontSize:17}}>{pt.icon}</span>
              {pt.label}
            </button>
          ))}
        </div>

        {/* WIN / SANTI */}
        {(pTab==='win'||pTab==='santi')&&(()=>{
          const who=pTab;
          const myPicks=preds[who];
          const correct=Object.keys(actual).filter(id=>myPicks[id]&&myPicks[id]===actual[id]).length;
          const done=Object.keys(myPicks).length;
          return(
          <div>
            <div style={{
              background:'linear-gradient(135deg,#0a1628,#071022)',
              border:'1px solid #00d4aa33',borderRadius:10,
              padding:'12px 14px',marginBottom:12,
              display:'flex',justifyContent:'space-between',alignItems:'center',
            }}>
              <div>
                <div style={{fontSize:10,color:'#6070a0',letterSpacing:2}}>
                  PREDICCIONES DE {who.toUpperCase()}</div>
                <div style={{fontSize:20,fontWeight:800,color:'#00d4aa',
                  fontFamily:"'Barlow Condensed',sans-serif",marginTop:2}}>
                  {done} / {UPCOMING.length} elegidas</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'#6070a0'}}>Acertadas</div>
                <div style={{fontSize:26,fontWeight:800,color:'#f0c040',
                  fontFamily:"'Barlow Condensed',sans-serif"}}>{correct}</div>
              </div>
            </div>

            {UPCOMING.map(m=>{
              const pick=myPicks[m.id];
              const res=actual[m.id];
              const ok=res&&pick&&res===pick;
              const fail=res&&pick&&res!==pick;
              return(
              <div key={m.id} style={{
                background:'#0d1220',
                border:`1px solid ${ok?'#00d4aa44':fail?'#ff445533':'#ffffff0a'}`,
                borderRadius:10,marginBottom:6,padding:'10px 12px',
              }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
                  <div style={{flex:1}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{T[m.h].n}</span>
                    <span style={{fontSize:11,color:'#6070a0',margin:'0 6px'}}>vs</span>
                    <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{T[m.a].n}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:10,color:'#6070a0'}}>{m.date}</span>
                    {res&&<span style={{fontSize:16}}>{ok?'✅':'❌'}</span>}
                  </div>
                </div>

                <div style={{display:'flex',gap:5}}>
                  {[
                    {v:'h',label:T[m.h].n.split(' ')[0],col:T[m.h].c},
                    {v:'d',label:'Empate',col:'#f0c040'},
                    {v:'a',label:T[m.a].n.split(' ')[0],col:T[m.a].c},
                  ].map(btn=>(
                    <button key={btn.v} className="pb" onClick={()=>setPick(who,m.id,btn.v)} style={{
                      flex:1,
                      background:pick===btn.v?btn.col+'33':'#151d2e',
                      color:pick===btn.v?'#fff':'#6070a0',
                      border:`1px solid ${pick===btn.v?btn.col+'88':'#ffffff18'}`,
                      fontWeight:pick===btn.v?700:500,fontSize:11,padding:'6px 4px',
                      textAlign:'center',
                    }}>{btn.label}</button>
                  ))}
                </div>

                {res&&(
                  <div style={{fontSize:11,color:'#6070a0',marginTop:6,textAlign:'center'}}>
                    Resultado: <strong style={{color:'#dde8ff'}}>{pLabel(res)}</strong>
                    {' · '}Pick: <strong style={{color:ok?'#00d4aa':'#ff4455'}}>
                      {pLabel(pick)||'Sin pick'}</strong>
                  </div>
                )}
              </div>
              );
            })}
          </div>
          );
        })()}

        {/* CLAUDE */}
        {pTab==='claude'&&(
          <div>
            <div style={{
              background:'linear-gradient(135deg,#071828,#040e1a)',
              border:'1px solid #00d4aa33',borderRadius:10,padding:'14px',marginBottom:12,
            }}>
              <div style={{fontSize:10,color:'#6070a0',letterSpacing:2,marginBottom:6}}>
                🤖 ANÁLISIS DE CLAUDE IA</div>
              <p style={{fontSize:13,color:'#8090b0',lineHeight:1.6,marginBottom:12}}>
                Claude analiza probabilidades estadísticas, forma reciente y Head-to-Head
                para predecir los resultados de esta jornada.
              </p>
              <button onClick={getClaudePicks} disabled={cLoad} style={{
                width:'100%',
                background:cLoad?'#151d2e':'linear-gradient(135deg,#00d4aa,#0090aa)',
                color:cLoad?'#6070a0':'#070b16',
                border:'none',borderRadius:9,padding:'11px',
                cursor:cLoad?'default':'pointer',
                fontFamily:"'Barlow Condensed',sans-serif",
                fontWeight:700,fontSize:16,letterSpacing:1,
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                transition:'all .2s',
              }}>
                {cLoad
                  ?<><span style={{animation:'shimmer 1s infinite'}}>⏳</span> ANALIZANDO PARTIDOS...</>
                  :<><span>🤖</span> OBTENER PREDICCIONES DE CLAUDE</>
                }
              </button>
              {cMsg&&<div style={{
                marginTop:8,fontSize:12,textAlign:'center',
                color:cMsg.includes('✅')?'#00d4aa':'#ff4455',
              }}>{cMsg}</div>}
            </div>

            {UPCOMING.map(m=>{
              const pick=preds.claude[m.id];
              const res=actual[m.id];
              const ok=res&&pick&&res===pick;
              const fail=res&&pick&&res!==pick;
              const maxP=Math.max(m.prob.h,m.prob.a,m.prob.d);
              return(
              <div key={m.id} style={{
                background:'#0d1220',
                border:`1px solid ${ok?'#00d4aa44':fail?'#ff445533':'#ffffff0a'}`,
                borderRadius:10,marginBottom:6,padding:'10px 12px',
              }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:13}}>
                    <strong style={{color:'#fff'}}>{T[m.h].n}</strong>
                    <span style={{color:'#6070a0',margin:'0 5px'}}>vs</span>
                    <strong style={{color:'#fff'}}>{T[m.a].n}</strong>
                  </span>
                  {res&&<span style={{fontSize:16}}>{ok?'✅':'❌'}</span>}
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{
                    padding:'6px 14px',borderRadius:8,fontSize:12,fontWeight:700,
                    background:pick?({h:T[m.h].c,a:T[m.a].c,d:'#f0c040'}[pick]||'#151d2e')+'33':'#151d2e',
                    border:`1px solid ${pick?({h:T[m.h].c,a:T[m.a].c,d:'#f0c040'}[pick]||'#fff')+'55':'#ffffff18'}`,
                    color:pick?'#fff':'#6070a0',
                  }}>
                    {pick
                      ?{h:`🏠 ${T[m.h].n}`,a:`✈️ ${T[m.a].n}`,d:'🤝 Empate'}[pick]
                      :'— Sin analizar aún —'}
                  </div>
                  <div style={{fontSize:11,color:'#6070a0'}}>
                    Estadística: {maxP}%
                  </div>
                </div>
                {res&&(
                  <div style={{fontSize:11,color:'#6070a0',marginTop:6}}>
                    Resultado real: <strong style={{color:'#dde8ff'}}>{pLabel(res)}</strong>
                    {' · '}Claude: <strong style={{color:ok?'#00d4aa':'#ff4455'}}>{pLabel(pick)||'N/A'}</strong>
                  </div>
                )}
              </div>
              );
            })}
          </div>
        )}

        {/* MARCADOR */}
        {pTab==='board'&&(()=>{
          const sc={win:calcScore('win'),santi:calcScore('santi'),claude:calcScore('claude')};
          const ranked=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct);
          const META={
            win:  {label:'Win',   icon:'⚽',col:'#EF0107'},
            santi:{label:'Santi', icon:'🎯',col:'#6CABDD'},
            claude:{label:'Claude IA',icon:'🤖',col:'#00d4aa'},
          };
          return(
          <div>
            {/* Ingresar resultados reales */}
            <div style={{fontSize:10,color:'#00d4aa',letterSpacing:2,marginBottom:8}}>
              INGRESAR RESULTADOS REALES</div>
            {UPCOMING.map(m=>(
              <div key={m.id} style={{
                background:'#0d1220',border:'1px solid #ffffff0a',
                borderRadius:9,marginBottom:5,padding:'9px 12px',
              }}>
                <div style={{fontSize:12,color:'#6070a0',marginBottom:6}}>
                  {m.date} ·{' '}
                  <strong style={{color:'#dde8ff'}}>{T[m.h].n}</strong>
                  {' vs '}
                  <strong style={{color:'#dde8ff'}}>{T[m.a].n}</strong>
                </div>
                <div style={{display:'flex',gap:5}}>
                  {[{v:'h',label:'🏠 Local'},{v:'d',label:'🤝 Empate'},{v:'a',label:'✈️ Visita'}].map(btn=>(
                    <button key={btn.v} className="pb" onClick={()=>toggleActual(m.id,btn.v)} style={{
                      flex:1,
                      background:actual[m.id]===btn.v?'#00d4aa22':'#151d2e',
                      color:actual[m.id]===btn.v?'#00d4aa':'#6070a0',
                      border:`1px solid ${actual[m.id]===btn.v?'#00d4aa55':'#ffffff18'}`,
                      fontWeight:actual[m.id]===btn.v?700:500,
                      fontSize:11,padding:'6px 3px',
                    }}>{btn.label}</button>
                  ))}
                  {actual[m.id]&&(
                    <button className="pb" onClick={()=>toggleActual(m.id,actual[m.id])} style={{
                      background:'#ff445518',color:'#ff4455',
                      border:'1px solid #ff445540',padding:'6px 8px',fontSize:12,
                    }}>✕</button>
                  )}
                </div>
              </div>
            ))}

            {/* Tabla de líderes */}
            <div style={{fontSize:10,color:'#f0c040',letterSpacing:2,margin:'16px 0 10px'}}>
              🏅 TABLA DE ACIERTOS</div>

            {ranked.map(([name,s],i)=>{
              const m=META[name];
              return(
              <div key={name} style={{
                background:i===0?'linear-gradient(135deg,#1a1400,#2a1e00)':'#0d1220',
                border:`1px solid ${i===0?'#f0c04055':'#ffffff0a'}`,
                borderRadius:11,marginBottom:7,padding:'14px 16px',
                display:'flex',alignItems:'center',gap:12,
              }}>
                <div style={{fontSize:28,lineHeight:1}}>{medal(i)}</div>
                <div style={{width:4,height:44,borderRadius:2,background:m.col,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:17,
                    color:i===0?'#f0c040':'#dde8ff',
                    fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>
                    {m.icon} {m.label}</div>
                  <div style={{fontSize:12,color:'#6070a0',marginTop:2}}>
                    {s.w} acertadas de {s.tot} resultados ingresados</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{
                    fontSize:32,fontWeight:800,lineHeight:1,
                    color:i===0?'#f0c040':m.col,
                    fontFamily:"'Barlow Condensed',sans-serif",
                  }}>{s.pct}%</div>
                  <div style={{fontSize:10,color:'#6070a0'}}>precisión</div>
                </div>
              </div>
              );
            })}

            {Object.keys(actual).length===0&&(
              <div style={{
                textAlign:'center',color:'#6070a0',fontSize:13,marginTop:6,
                padding:'24px',background:'#0d1220',borderRadius:10,border:'1px solid #ffffff0a',
                lineHeight:1.6,
              }}>
                ☝️ Primero asegúrate de que Win, Santi y Claude hagan sus picks en sus tabs.<br/>
                Luego ingresa los resultados reales aquí para calcular quién acierta más.
              </div>
            )}
          </div>
          );
        })()}

      </div>}

    </main>

    {/* ── FOOTER ── */}
    <footer style={{
      textAlign:'center',padding:'12px',
      borderTop:'1px solid #ffffff08',
      fontSize:10,color:'#4050700',color:'#405070',letterSpacing:1,
    }}>
      EPL TRACKER CR · github.com/winreds · {new Date().getFullYear()}
    </footer>

  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
