const scoreToResult=(hs,as)=>{
  const h=parseInt(hs),a=parseInt(as);
  if(isNaN(h)||isNaN(a))return null;
  if(h>a)return'h';if(a>h)return'a';return'd';
};

/* Check if a game has already started in CR time */
const gameStarted=(crStartStr)=>{
  const now=new Date();
  /* crStartStr is 'YYYY-MM-DDTHH:MM' in CR (UTC-6) */
  const [datePart,timePart]=crStartStr.split('T');
  const [y,mo,d]=datePart.split('-').map(Number);
  const [hh,mm]=timePart.split(':').map(Number);
  /* Create date in UTC (add 6 hours for CR->UTC) */
  const gameUTC=new Date(Date.UTC(y,mo-1,d,hh+6,mm));
  return now>=gameUTC;
};

function Login({onLogin}){
  const[sel,setSel]=useState(null);
  const[pwd,setPwd]=useState('');
  const[err,setErr]=useState('');
  const[sp,setSp]=useState(false);
  const ref=useRef();
  const users=getUsers();
  const pick=u=>{setSel(u);setErr('');setPwd('');setTimeout(()=>ref.current&&ref.current.focus(),80);};
  const go=()=>{
    const u=users.find(x=>x.id===sel.id);
    if(!u||pwd!==u.pwd){setErr('Contraseña incorrecta.');return;}
    const s={id:u.id,label:u.label,icon:u.icon,color:u.color,role:u.role};
    saveSession(s);onLogin(s);
  };
  return(
  <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',padding:20,
    background:'radial-gradient(ellipse at 50% -10%,#0d2040 0%,#070b16 65%)'}}>
    <div style={{animation:'loginPop .5s ease',textAlign:'center',marginBottom:28}}>
      <div style={{width:68,height:68,borderRadius:16,margin:'0 auto 12px',
        background:'linear-gradient(135deg,#00d4aa,#0090aa)',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:30,fontWeight:900,color:'#070b16',
        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:-1,
        boxShadow:'0 8px 32px #00d4aa44'}}>EPL</div>
      <div style={{fontSize:26,fontWeight:800,color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2}}>
        EPL TRACKER <span style={{color:'#00d4aa'}}>CR</span></div>
      <div style={{fontSize:10,color:'#6070a0',letterSpacing:3,marginTop:3}}>PREMIER LEAGUE 2025–26</div>
    </div>
    <div style={{background:'#0d1220',border:'1px solid #ffffff12',borderRadius:16,
      padding:'26px 22px',width:'100%',maxWidth:350,
      animation:'loginPop .45s .08s ease both',boxShadow:'0 20px 60px #00000060'}}>
      {!sel?(
        <>
          <div style={{fontSize:11,color:'#6070a0',letterSpacing:2,textAlign:'center',marginBottom:18}}>SELECCIONA TU USUARIO</div>
          {users.map(u=>(
            <button key={u.id} onClick={()=>pick(u)} style={{
              display:'flex',alignItems:'center',gap:14,padding:'13px 16px',
              borderRadius:11,border:'none',cursor:'pointer',background:'#151d2e',
              width:'100%',marginBottom:8,borderLeft:`4px solid ${u.color}`,transition:'all .2s',}}
              onMouseEnter={e=>e.currentTarget.style.background='#1c2840'}
              onMouseLeave={e=>e.currentTarget.style.background='#151d2e'}>
              <span style={{fontSize:26}}>{u.icon}</span>
              <div style={{textAlign:'left'}}>
                <div style={{fontSize:16,fontWeight:700,color:'#fff',fontFamily:"'Barlow Condensed',sans-serif"}}>{u.label}</div>
                <div style={{fontSize:10,color:u.color,letterSpacing:1}}>{u.role.toUpperCase()} · EPL Tracker CR</div>
              </div>
              <span style={{marginLeft:'auto',fontSize:16,color:'#6070a0'}}>→</span>
            </button>
          ))}
        </>
      ):(
        <>
          <button onClick={()=>{setSel(null);setErr('');setPwd('');}} style={{
            background:'transparent',border:'none',color:'#6070a0',cursor:'pointer',
            fontSize:11,letterSpacing:1,fontFamily:"'Rajdhani',sans-serif",fontWeight:600,
            marginBottom:14,display:'flex',alignItems:'center',gap:4}}>← CAMBIAR USUARIO</button>
          <div style={{display:'flex',alignItems:'center',gap:12,background:'#151d2e',
            borderRadius:10,padding:'11px 13px',marginBottom:18,borderLeft:`4px solid ${sel.color}`}}>
            <span style={{fontSize:26}}>{sel.icon}</span>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'#fff',fontFamily:"'Barlow Condensed',sans-serif"}}>{sel.label}</div>
              <div style={{fontSize:10,color:sel.color,letterSpacing:1}}>{sel.role.toUpperCase()}</div>
            </div>
          </div>
          <div style={{fontSize:10,color:'#6070a0',letterSpacing:1.5,marginBottom:5}}>CONTRASEÑA</div>
          <div style={{position:'relative',marginBottom:err?6:14}}>
            <input ref={ref} type={sp?'text':'password'} value={pwd}
              onChange={e=>{setPwd(e.target.value);setErr('');}}
              onKeyDown={e=>e.key==='Enter'&&go()}
              placeholder="Ingresa tu contraseña"
              style={{width:'100%',padding:'10px 40px 10px 13px',background:'#070b16',
                border:`1px solid ${err?'#ff4455':'#ffffff18'}`,borderRadius:9,
                color:'#dde8ff',fontSize:15,fontWeight:600,outline:'none',transition:'border-color .2s'}}
              onFocus={e=>e.target.style.borderColor='#00d4aa55'}
              onBlur={e=>e.target.style.borderColor=err?'#ff4455':'#ffffff18'}/>
            <button onClick={()=>setSp(!sp)} style={{position:'absolute',right:11,top:'50%',
              transform:'translateY(-50%)',background:'transparent',border:'none',cursor:'pointer',
              color:'#6070a0',fontSize:15}}>{sp?'🙈':'👁️'}</button>
          </div>
          {err&&<div style={{fontSize:12,color:'#ff4455',marginBottom:12}}>{err}</div>}
          <button onClick={go} style={{width:'100%',padding:'11px',borderRadius:9,border:'none',

            color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,
            letterSpacing:1,boxShadow:`0 4px 18px ${sel.color}44`,transition:'all .2s'}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateY(-1px)'}
            onMouseLeave={e=>e.currentTarget.style.transform='none'}>ENTRAR AL TRACKER</button>
        </>
      )}
    </div>
    <div style={{marginTop:18,fontSize:10,color:'#405070',letterSpacing:1}}>github.com/winreds · EPL Tracker CR</div>
  </div>
  );
}

            const sc=scores[g.id];
            return(
            <div key={g.id} style={{background:'#0d1220',
              border:`1px solid ${ok?'#00d4aa44':fail?'#ff445533':started&&!pick?'#ff445522':'#ffffff0a'}`,
              borderRadius:10,marginBottom:5,padding:'9px 11px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span style={{fontSize:13}}><strong style={{color:'#fff'}}>{T[g.h].n}</strong><span style={{color:'#6070a0',margin:'0 5px'}}>vs</span><strong style={{color:'#fff'}}>{T[g.a].n}</strong></span>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  {sc&&sc.hs!==''&&sc.as!==''&&<span style={{fontSize:11,fontWeight:700,color:'#dde8ff',background:'#151d2e',padding:'2px 7px',borderRadius:5}}>{sc.hs}-{sc.as}</span>}
                  {started&&!pick&&<span style={{fontSize:9,color:'#ff4455',background:'#ff445518',padding:'1px 6px',borderRadius:4,letterSpacing:1}}>🔒 TARDE</span>}
                  {res&&<span style={{fontSize:14}}>{ok?'✅':'❌'}</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:7,alignItems:'center'}}>
                <div style={{padding:'5px 12px',borderRadius:8,fontSize:12,fontWeight:700,
                  background:pick?({h:T[g.h].c,a:T[g.a].c,d:'#f0c040'}[pick]+'33'):'#151d2e',
                  border:`1px solid ${pick?({h:T[g.h].c,a:T[g.a].c,d:'#f0c040'}[pick]+'55'):'#ffffff18'}`,
                  color:pick?'#fff':'#6070a0'}}>
                  {pick?{h:`🏠 ${T[g.h].n}`,a:`✈️ ${T[g.a].n}`,d:'🤝 Empate'}[pick]:started?'— No predicho (bloqueado) —':'— Sin analizar aún —'}
                </div>
                <div style={{fontSize:11,color:'#6070a0'}}>Estadística: {maxP}%</div>
              </div>
              {res&&<div style={{fontSize:11,color:'#6070a0',marginTop:5}}>
                Real: <strong style={{color:'#dde8ff'}}>{pL(res)}</strong>{' · '}
                Claude: <strong style={{color:ok?'#00d4aa':'#ff4455'}}>{pL(pick)||'N/A'}</strong>
              </div>}
            </div>
            );
          })}
        </div>)}

        {/* MARCADOR */}
        {pTab==='board'&&(()=>{
          const sc2={win:calcScore('win'),santi:calcScore('santi'),claude:calcScore('claude')};
          const ranked=Object.entries(sc2).sort((a,b)=>b[1].pct-a[1].pct);
          return(<div>
            <div style={{fontSize:9,color:'#00d4aa',letterSpacing:2,marginBottom:6}}>INGRESAR MARCADORES REALES</div>
            <div style={{fontSize:11,color:'#6070a0',background:'#0d1220',border:'1px solid #ffffff0a',
              borderRadius:8,padding:'8px 11px',marginBottom:8}}>
              {user.role==='admin'
                ?'✅ Admin — ingresa el marcador exacto de cada partido. El resultado (G/E/P) se calcula automáticamente.'
                :'👁️ Solo admins pueden ingresar marcadores.'}
            </div>
            {UPCOMING.map(g=>{
              const s=scores[g.id]||{hs:'',as:''};
              const r=scoreToResult(s.hs,s.as);
              const canEdit=user.role==='admin';
              return(
              <div key={g.id} style={{background:'#0d1220',border:`1px solid ${r?'#00d4aa33':'#ffffff0a'}`,
                borderRadius:9,marginBottom:5,padding:'9px 11px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
                  <div style={{flex:1,textAlign:'right',fontSize:13,fontWeight:700,color:'#fff'}}>{T[g.h].n}</div>
                  {/* Score inputs */}
                  <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                    <input type="number" min="0" max="20" value={s.hs}
                      onChange={e=>canEdit&&setScore(g.id,'hs',e.target.value)}
                      readOnly={!canEdit}
                      style={{width:44,padding:'5px',textAlign:'center',background:canEdit?'#151d2e':'#0d1220',
                        border:`1px solid ${r&&s.hs!==''?'#00d4aa55':'#ffffff18'}`,
                        borderRadius:7,color:'#fff',fontSize:18,fontWeight:800,outline:'none',
                        fontFamily:"'Barlow Condensed',sans-serif",cursor:canEdit?'text':'default'}}/>
                    <span style={{color:'#6070a0',fontWeight:700,fontSize:18}}>-</span>
                    <input type="number" min="0" max="20" value={s.as}
                      onChange={e=>canEdit&&setScore(g.id,'as',e.target.value)}
                      readOnly={!canEdit}
                      style={{width:44,padding:'5px',textAlign:'center',background:canEdit?'#151d2e':'#0d1220',
                        border:`1px solid ${r&&s.as!==''?'#00d4aa55':'#ffffff18'}`,
                        borderRadius:7,color:'#fff',fontSize:18,fontWeight:800,outline:'none',
                        fontFamily:"'Barlow Condensed',sans-serif",cursor:canEdit?'text':'default'}}/>
                  </div>
                  <div style={{flex:1,textAlign:'left',fontSize:13,fontWeight:700,color:'#fff'}}>{T[g.a].n}</div>
                </div>
                {/* Result badge */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
                  <span style={{fontSize:10,color:'#6070a0'}}>{g.date} · {g.time} CR</span>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    {r&&(
                      <>
                        <div style={{
                          padding:'3px 12px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:1,
                          background:r==='h'?T[g.h].c+'33':r==='a'?T[g.a].c+'33':'#f0c04033',
                          color:r==='h'?T[g.h].c:r==='a'?T[g.a].c:'#f0c040',
                          border:`1px solid ${r==='h'?T[g.h].c+'55':r==='a'?T[g.a].c+'55':'#f0c04055'}`,
                        }}>
                          {r==='h'?`Gana ${T[g.h].n}`:r==='a'?`Gana ${T[g.a].n}`:'Empate'}
                        </div>
                        {canEdit&&<button className="pb" onClick={()=>setScores(p=>{const n={...p};delete n[g.id];return n;})} style={{
                          background:'#ff445518',color:'#ff4455',border:'1px solid #ff445540',padding:'4px 8px',fontSize:11}}>✕</button>}
                      </>
                    )}
                    {!r&&s.hs!==''&&s.as!==''&&(
                      <span style={{fontSize:11,color:'#f0c040'}}>⚠️ Marcador incompleto</span>
                    )}
                    {r===null&&s.hs===''&&<span style={{fontSize:11,color:'#6070a0'}}>Sin resultado</span>}
                  </div>
                </div>
              </div>
              );
            })}

            <div style={{fontSize:9,color:'#f0c040',letterSpacing:2,margin:'14px 0 8px'}}>🏅 TABLA DE ACIERTOS</div>
            {ranked.map(([name,s],i)=>{const m=UM[name];return(
              <div key={name} style={{background:i===0?'linear-gradient(135deg,#1a1400,#2a1e00)':'#0d1220',
                border:`1px solid ${i===0?'#f0c04055':'#ffffff0a'}`,borderRadius:11,marginBottom:6,padding:'12px 15px',
                display:'flex',alignItems:'center',gap:11}}>
                <div style={{fontSize:24,lineHeight:1}}>{med(i)}</div>
                <div style={{width:4,height:40,borderRadius:2,background:m.c,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:i===0?'#f0c040':'#dde8ff',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>
                    {m.i} {m.l}
                    {name===user.id&&<span style={{marginLeft:7,fontSize:9,color:m.c,background:m.c+'22',padding:'1px 6px',borderRadius:4}}>TÚ</span>}
                  </div>
                  <div style={{fontSize:11,color:'#6070a0',marginTop:2}}>{s.w} acertadas de {s.tot} marcadores ingresados</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:28,fontWeight:800,lineHeight:1,color:i===0?'#f0c040':m.c,fontFamily:"'Barlow Condensed',sans-serif"}}>{s.pct}%</div>
                  <div style={{fontSize:10,color:'#6070a0'}}>precisión</div>
                </div>
              </div>
            );})}
            {Object.keys(actual).length===0&&(
              <div style={{textAlign:'center',color:'#6070a0',fontSize:13,padding:'18px',background:'#0d1220',borderRadius:10,border:'1px solid #ffffff0a',lineHeight:1.6}}>
                ☝️ Ingresa marcadores reales arriba. El sistema calcula automáticamente G/E/P.</div>
            )}
          </div>);
        })()}
      </div>}

    </main>
    <footer style={{textAlign:'center',padding:'9px',borderTop:'1px solid #ffffff08',fontSize:10,color:'#405070',letterSpacing:1}}>
      EPL TRACKER CR · github.com/winreds · 2026
    </footer>
  </div>
  );
}

/* ══════════════ ROOT ══════════════ */
function Root(){
  const[user,setUser]=useState(()=>getSession());
  return user?<MainApp user={user} onLogout={()=>setUser(null)}/>:<Login onLogin={u=>setUser(u)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
